<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | FixMyRoad</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --card: #1c1c1c;
      --accent: #f5a623;
      --accent2: #e63946;
      --success: #2ecc71;
      --warning: #f5a623;
      --info: #3498db;
      --text: #f0ece4;
      --muted: #777;
      --border: #2a2a2a;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .logo span { color: var(--accent2); }

    .admin-badge {
      background: var(--accent2);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
    }

    header nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    header nav a:hover { color: var(--accent); }

    /* Layout */
    .layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .sidebar-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      margin-bottom: 0.3rem;
    }

    .sidebar-btn:hover { background: var(--card); color: var(--text); }
    .sidebar-btn.active { background: rgba(245,166,35,0.12); color: var(--accent); }

    /* Main content */
    main {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 0.3rem;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-card.total::before { background: var(--info); }
    .stat-card.pending::before { background: var(--muted); }
    .stat-card.inprogress::before { background: var(--warning); }
    .stat-card.resolved::before { background: var(--success); }
    .stat-card.high::before { background: var(--accent2); }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      line-height: 1;
    }

    .stat-card.total .stat-value { color: var(--info); }
    .stat-card.pending .stat-value { color: var(--text); }
    .stat-card.inprogress .stat-value { color: var(--warning); }
    .stat-card.resolved .stat-value { color: var(--success); }
    .stat-card.high .stat-value { color: var(--accent2); }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }

    .filter-bar input {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.4rem 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .filter-bar input:focus { border-color: var(--accent); }

    /* Reports table */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface);
    }

    th {
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    td {
      padding: 1rem 1.2rem;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge.pending { background: #1f1f1f; color: #999; border: 1px solid #333; }
    .status-badge.in-progress { background: #2a1f00; color: var(--warning); border: 1px solid #4a3800; }
    .status-badge.resolved { background: #0d2e18; color: var(--success); border: 1px solid #1a5e30; }

    .severity-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .severity-dot.low { background: var(--success); }
    .severity-dot.medium { background: var(--warning); }
    .severity-dot.high { background: var(--accent2); }

    /* Status select */
    .status-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.3rem 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .status-select:focus { border-color: var(--accent); }

    /* Action buttons */
    .btn-view {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 0.4rem;
    }

    .btn-view:hover { border-color: var(--info); color: var(--info); }

    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.95rem; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .modal-close:hover { color: var(--accent2); }

    .modal-field { margin-bottom: 1rem; }
    .modal-field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .modal-field p { font-size: 0.95rem; line-height: 1.5; }

    .modal-photo {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Refresh btn */
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 0.4rem 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .filter-bar input { width: 100%; margin-left: 0; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.7rem 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:1rem;">
    <div class="logo">Fix<span>My</span>Road</div>
    <span class="admin-badge">Admin</span>
  </div>
  <nav>
    <a href="index.html">+ Report</a>
    <a href="admin.html">Dashboard</a>
  </nav>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-title">Navigation</div>
    <button class="sidebar-btn active" onclick="filterStatus('all', this)">📋 All Reports</button>
    <button class="sidebar-btn" onclick="filterStatus('pending', this)">⏳ Pending</button>
    <button class="sidebar-btn" onclick="filterStatus('in-progress', this)">🔧 In Progress</button>
    <button class="sidebar-btn" onclick="filterStatus('resolved', this)">✅ Resolved</button>

    <div class="sidebar-title" style="margin-top:2rem;">Severity</div>
    <button class="sidebar-btn" onclick="filterSeverity('high')">🔴 High Priority</button>
    <button class="sidebar-btn" onclick="filterSeverity('medium')">🟡 Medium</button>
    <button class="sidebar-btn" onclick="filterSeverity('low')">🟢 Low</button>
  </aside>

  <main>
    <div class="page-title">ADMIN DASHBOARD</div>
    <div class="page-subtitle">Manage and update pothole reports</div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card total">
        <div class="stat-label">Total Reports</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">—</div>
      </div>
      <div class="stat-card inprogress">
        <div class="stat-label">In Progress</div>
        <div class="stat-value" id="stat-inprogress">—</div>
      </div>
      <div class="stat-card resolved">
        <div class="stat-label">Resolved</div>
        <div class="stat-value" id="stat-resolved">—</div>
      </div>
      <div class="stat-card high">
        <div class="stat-label">High Severity</div>
        <div class="stat-value" id="stat-high">—</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterStatus('all', this)">All</button>
      <button class="filter-btn" onclick="filterStatus('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterStatus('in-progress', this)">In Progress</button>
      <button class="filter-btn" onclick="filterStatus('resolved', this)">Resolved</button>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      <input type="text" id="search-input" placeholder="🔍 Search by address..." oninput="applySearch()" />
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#ID</th>
            <th>Address</th>
            <th>Reported By</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reports-tbody">
          <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>REPORT DETAILS</h2>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  let allReports = [];
  let currentFilter = 'all';
  let currentSeverityFilter = null;

  async function loadStats() {
    const res = await fetch('/api/stats');
    const s = await res.json();
    document.getElementById('stat-total').textContent = s.total;
    document.getElementById('stat-pending').textContent = s.pending;
    document.getElementById('stat-inprogress').textContent = s.inProgress;
    document.getElementById('stat-resolved').textContent = s.resolved;
    document.getElementById('stat-high').textContent = s.highSeverity;
  }

  async function loadAll() {
    await loadStats();
    const res = await fetch('/api/reports');
    allReports = await res.json();
    renderTable(allReports);
  }

  function applySearch() {
    const q = document.getElementById('search-input').value.toLowerCase();
    let filtered = allReports;
    if (currentFilter !== 'all') filtered = filtered.filter(r => r.status === currentFilter);
    if (currentSeverityFilter) filtered = filtered.filter(r => r.severity === currentSeverityFilter);
    if (q) filtered = filtered.filter(r => r.address.toLowerCase().includes(q) || r.description.toLowerCase().includes(q));
    renderTable(filtered);
  }

  function filterStatus(status, btn) {
    currentFilter = status;
    currentSeverityFilter = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    applySearch();
  }

  function filterSeverity(sev) {
    currentSeverityFilter = sev;
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn, .sidebar-btn').forEach(b => b.classList.remove('active'));
    applySearch();
  }

  function renderTable(reports) {
    const tbody = document.getElementById('reports-tbody');
    if (!reports.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">🕳️</div><p>No reports found.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = reports.map(r => `
      <tr>
        <td style="font-family:monospace;font-size:0.78rem;color:var(--muted)">${r.id.slice(-6)}</td>
        <td style="max-width:180px">
          <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.address}</div>
        </td>
        <td style="color:var(--muted);font-size:0.85rem">${r.name || 'Anonymous'}</td>
        <td>
          <span class="severity-dot ${r.severity}"></span>
          <span style="text-transform:capitalize;font-size:0.85rem">${r.severity}</span>
        </td>
        <td>
          <select class="status-select" onchange="updateStatus('${r.id}', this.value)">
            <option value="pending" ${r.status==='pending'?'selected':''}>⏳ Pending</option>
            <option value="in-progress" ${r.status==='in-progress'?'selected':''}>🔧 In Progress</option>
            <option value="resolved" ${r.status==='resolved'?'selected':''}>✅ Resolved</option>
          </select>
        </td>
        <td style="color:var(--muted);font-size:0.82rem;white-space:nowrap">${new Date(r.createdAt).toLocaleDateString('en-IN')}</td>
        <td>
          <button class="btn-view" onclick="viewReport('${r.id}')">👁 View</button>
          <button class="btn-delete" onclick="deleteReport('${r.id}')">🗑</button>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(id, status) {
    const res = await fetch(`/api/reports/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    if (res.ok) {
      const idx = allReports.findIndex(r => r.id === id);
      if (idx !== -1) allReports[idx].status = status;
      loadStats();
    }
  }

  async function deleteReport(id) {
    if (!confirm('Delete this report?')) return;
    const res = await fetch(`/api/reports/${id}`, { method: 'DELETE' });
    if (res.ok) {
      allReports = allReports.filter(r => r.id !== id);
      applySearch();
      loadStats();
    }
  }

  function viewReport(id) {
    const r = allReports.find(r => r.id === id);
    if (!r) return;
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-grid">
        <div class="modal-field">
          <label>Report ID</label>
          <p style="font-family:monospace;font-size:0.85rem;color:var(--muted)">${r.id}</p>
        </div>
        <div class="modal-field">
          <label>Date Reported</label>
          <p>${new Date(r.createdAt).toLocaleString('en-IN')}</p>
        </div>
        <div class="modal-field">
          <label>Reported By</label>
          <p>${r.name || 'Anonymous'}${r.phone ? ' · ' + r.phone : ''}</p>
        </div>
        <div class="modal-field">
          <label>Severity</label>
          <p style="text-transform:capitalize"><span class="severity-dot ${r.severity}"></span>${r.severity}</p>
        </div>
      </div>
      <div class="modal-field">
        <label>Address</label>
        <p>${r.address}</p>
      </div>
      ${r.latitude ? `<div class="modal-field"><label>GPS Coordinates</label><p style="font-family:monospace;font-size:0.85rem">${r.latitude}, ${r.longitude}</p></div>` : ''}
      <div class="modal-field">
        <label>Description</label>
        <p style="color:var(--muted);line-height:1.6">${r.description}</p>
      </div>
      <div class="modal-field">
        <label>Current Status</label>
        <select class="status-select" style="width:100%;margin-top:0.3rem" onchange="updateStatus('${r.id}', this.value)">
          <option value="pending" ${r.status==='pending'?'selected':''}>⏳ Pending</option>
          <option value="in-progress" ${r.status==='in-progress'?'selected':''}>🔧 In Progress</option>
          <option value="resolved" ${r.status==='resolved'?'selected':''}>✅ Resolved</option>
        </select>
      </div>
      ${r.photo ? `<div class="modal-field"><label>Photo</label><img class="modal-photo" src="${r.photo}" alt="Pothole Photo" /></div>` : ''}
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
  }

  function closeModalBtn() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  loadAll();
</script>
</body>
</html>
